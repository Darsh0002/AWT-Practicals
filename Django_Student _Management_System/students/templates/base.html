{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Student Management System{% endblock %}</title>
    <link rel="stylesheet" href="{% static 'students/css/style.css' %}">
</head>
<body>
    <header>
        <div class="container nav-container">
            <div class="brand">Student Management System</div>
            <nav>
                <ul>
                    <li><a href="{% url 'home' %}">Dashboard</a></li>
                    <li><a href="{% url 'student_list' %}">Students</a></li>
                    <li><a href="{% url 'course_list' %}">Courses</a></li>
                    <li><a href="{% url 'enrollment_list' %}">Enrollments</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <main>
        {% block content %}{% endblock %}
    </main>

    <footer>
        <div class="container">
            <p>&copy; 2026 Student Management System</p>
        </div>
    </footer>
</body>
</html>
