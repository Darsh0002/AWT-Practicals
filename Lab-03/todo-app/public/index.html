<!DOCTYPE html>
<html lang="en">
<head>
  <title>Todo App</title>
  <meta name="description" content="A beautiful, fully functional todo application to organize your tasks." />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div class="app-container">
    <!-- Header -->
    <header class="app-header">
      <h1>Todo List</h1>

      <div class="stats-bar">
        <div class="stat">
          <span class="stat-number" id="totalCount">0</span>
          <span class="stat-label">Total</span>
        </div>
        <div class="stat">
          <span class="stat-number" id="activeCount">0</span>
          <span class="stat-label">Active</span>
        </div>
        <div class="stat">
          <span class="stat-number" id="completedCount">0</span>
          <span class="stat-label">Done</span>
        </div>
      </div>
    </header>

    <!-- Add Todo Form -->
    <div class="add-todo-section">
      <div class="input-row">
        <input type="text" id="todoInput" placeholder="What needs to be done?" autocomplete="off" />
        <button class="btn-add" onclick="addTodo()">+</button>
      </div>
    </div>

    <!-- Filters -->
    <div class="filters-section">
      <div class="filter-tabs">
        <button class="filter-btn active" data-filter="all" onclick="setFilter('all')">All</button>
        <button class="filter-btn" data-filter="active" onclick="setFilter('active')">Active</button>
        <button class="filter-btn" data-filter="completed" onclick="setFilter('completed')">Completed</button>
      </div>
    </div>

    <!-- Todo List -->
    <ul class="todo-list" id="todoList"></ul>

    <!-- Empty State -->
    <div class="empty-state" id="emptyState" style="display:none;">
      <div class="empty-icon">📋</div>
      <p class="empty-title">No tasks yet</p>
      <p class="empty-desc">Add a task above to get started!</p>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
