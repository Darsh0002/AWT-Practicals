{% extends "base.html" %}

{% block title %}Add New Course - Student Management{% endblock %}

{% block content %}
<div class="header">
    <a href="{{ url_for('course_list') }}" style="text-decoration: none; color: var(--primary);">&larr; Back to Catalog</a>
    <h1>Add New Course</h1>
</div>

<div class="card" style="max-width: 600px; margin: 2rem auto;">
    <form method="POST">
        <div class="form-group">
            <label for="course_code">Course Code</label>
            <input type="text" id="course_code" name="course_code" class="form-input" required placeholder="e.g. CS101">
        </div>
        <div class="form-group">
            <label for="course_name">Course Name</label>
            <input type="text" id="course_name" name="course_name" class="form-input" required placeholder="e.g. Intro to Programming">
        </div>
        <div class="form-group">
            <label for="credits">Credits</label>
            <input type="number" id="credits" name="credits" class="form-input" required min="1" max="10" value="3">
        </div>
        <button type="submit" class="btn btn-large">Save Course</button>
    </form>
</div>
{% endblock %}
